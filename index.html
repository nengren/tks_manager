<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TK Store Manager</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F3EA;</text></svg>">
<style>
:root{--pri:#0ea5e9;--pri-d:#0284c7;--pri-l:#e0f2fe;--bg:#f1f5f9;--card:#fff;--text:#1e293b;--text2:#64748b;
--text3:#94a3b8;--ok:#10b981;--ok-bg:#ecfdf5;--warn:#f59e0b;--warn-bg:#fffbeb;--bad:#ef4444;--bad-bg:#fef2f2;
--border:#e2e8f0;--radius:10px;--shadow:0 1px 3px rgba(0,0,0,.06);--sidebar:#1e293b;--sidebar-hover:#334155;
--sidebar-active:#0ea5e9}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text)}
.hidden{display:none!important}
::selection{background:var(--pri-l)}
#loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%)}
.login-box{background:#fff;border-radius:16px;padding:48px 40px;width:400px;box-shadow:0 25px 60px rgba(0,0,0,.3)}
.login-box h1{font-size:1.6rem;text-align:center;margin-bottom:4px}
.login-box .sub{text-align:center;color:var(--text2);font-size:.85rem;margin-bottom:32px}
.fg{margin-bottom:18px}
.fg label{display:block;font-size:.78rem;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:.92rem;outline:none;transition:border .2s;background:#fff}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(14,165,233,.1)}
.fg textarea{resize:vertical;min-height:60px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border:none;border-radius:8px;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-pri{background:var(--pri);color:#fff;width:100%}.btn-pri:hover{background:var(--pri-d)}
.btn-ok{background:var(--ok);color:#fff}.btn-bad{background:var(--bad);color:#fff}
.btn-ghost{background:transparent;color:var(--text2);border:1.5px solid var(--border)}.btn-ghost:hover{border-color:var(--text3)}
.btn-sm{padding:6px 14px;font-size:.78rem}
.err-msg{color:var(--bad);font-size:.82rem;text-align:center;margin-top:14px;min-height:20px}
#app{display:none;height:100vh;overflow:hidden}
.app-wrap{display:flex;height:100%}
.sidebar{width:230px;background:var(--sidebar);color:#fff;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-brand{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-brand h2{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:8px}
.sidebar-brand p{font-size:.7rem;color:rgba(255,255,255,.4);margin-top:2px}
.sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.6);
font-size:.85rem;margin-bottom:2px;transition:all .15s;border:none;background:none;width:100%;text-align:left;position:relative}
.nav-item:hover{background:var(--sidebar-hover);color:#fff}
.nav-item.active{background:var(--sidebar-active);color:#fff;font-weight:600}
.nav-item .ni{font-size:1.1rem;width:24px;text-align:center}
.nav-badge{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--bad);color:#fff;
border-radius:10px;font-size:.62rem;font-weight:700;padding:1px 6px;min-width:18px;text-align:center}
.nav-sep{border-top:1px solid rgba(255,255,255,.08);margin:10px 14px}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.08)}
.sidebar-footer .sf-name{font-size:.82rem;font-weight:600}
.sidebar-footer .sf-role{font-size:.68rem;color:rgba(255,255,255,.4)}
.sidebar-footer button{margin-top:8px;background:none;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.6);
padding:6px 14px;border-radius:6px;font-size:.75rem;cursor:pointer;width:100%}
.sidebar-footer button:hover{background:rgba(255,255,255,.05);color:#fff}
.main{flex:1;overflow-y:auto;padding:28px 36px}
.main-header{margin-bottom:24px}
.main-header h1{font-size:1.4rem;font-weight:700}
.main-header p{font-size:.82rem;color:var(--text2);margin-top:2px}
.card{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow);border:1px solid var(--border)}
.card h3{font-size:1rem;margin-bottom:4px}
.card .sub-label{font-size:.75rem;color:var(--text3)}
.sec-title{font-size:.78rem;font-weight:700;color:var(--text2);margin:20px 0 10px;text-transform:uppercase;letter-spacing:.5px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:18px 16px;box-shadow:var(--shadow);border:1px solid var(--border)}
.stat-val{font-size:1.6rem;font-weight:700}
.stat-label{font-size:.72rem;color:var(--text2);margin-top:4px}
.quick-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.action-btn{background:var(--card);border:2px solid var(--border);border-radius:var(--radius);padding:24px 16px;
text-align:center;cursor:pointer;transition:all .15s}
.action-btn:hover{border-color:var(--pri);transform:translateY(-2px);box-shadow:0 4px 12px rgba(14,165,233,.15)}
.action-btn .ai{font-size:2.2rem;margin-bottom:8px}
.action-btn .az{font-size:.92rem;font-weight:600}
.action-btn .ae{font-size:.72rem;color:var(--text2);margin-top:2px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.form-row-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.store-checklist{margin-bottom:20px}
.store-cl-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#f8fafc;
border-radius:var(--radius) var(--radius) 0 0;border:1px solid var(--border);border-bottom:none;cursor:pointer}
.store-cl-header h4{font-size:.9rem;display:flex;align-items:center;gap:8px}
.store-cl-header .progress{font-size:.78rem;font-weight:700;padding:3px 10px;border-radius:20px}
.store-cl-header .progress.p-full{background:var(--ok-bg);color:var(--ok)}
.store-cl-header .progress.p-partial{background:var(--warn-bg);color:var(--warn)}
.store-cl-header .progress.p-none{background:var(--bad-bg);color:var(--bad)}
.store-cl-body{border:1px solid var(--border);border-radius:0 0 var(--radius) var(--radius);background:#fff}
.period-label{padding:8px 16px;font-size:.72rem;font-weight:700;color:var(--pri);text-transform:uppercase;background:#fafbfc;border-bottom:1px solid var(--border)}
.ck-item{display:flex;align-items:flex-start;gap:12px;padding:10px 16px;border-bottom:1px solid #f1f5f9;cursor:pointer;transition:background .1s}
.ck-item:hover{background:#fafbfc}
.ck-item:last-child{border:none}
.ck-box{width:22px;height:22px;border-radius:5px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;
justify-content:center;font-size:12px;transition:all .15s;margin-top:2px}
.ck-item.done .ck-box{background:var(--ok);border-color:var(--ok);color:#fff}
.ck-txt .t-zh{font-size:.82rem;font-weight:500}
.ck-txt .t-en{font-size:.7rem;color:var(--text3)}
.ck-txt .t-fil{font-size:.68rem;color:var(--text3);font-style:italic}
.ck-time{font-size:.65rem;color:var(--ok);margin-top:2px}
.staff-overview{margin-bottom:16px}
.staff-ov-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--card);
border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;margin-bottom:2px}
.staff-ov-header:hover{background:#fafbfc}
.staff-ov-header h4{font-size:.92rem}
.staff-ov-detail{padding:0 18px 12px;background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius)}
.staff-store-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:.82rem}
.staff-store-row:last-child{border:none}
.score-table{width:100%;border-collapse:collapse;font-size:.82rem}
.score-table th{text-align:left;padding:10px 12px;border-bottom:2px solid var(--border);font-size:.72rem;text-transform:uppercase;color:var(--text2);font-weight:700}
.score-table td{padding:10px 12px;border-bottom:1px solid #f1f5f9}
.score-table tr:hover td{background:#fafbfc}
.sv-good{color:var(--ok);font-weight:700}.sv-mid{color:var(--warn);font-weight:700}.sv-bad{color:var(--bad);font-weight:700}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.68rem;font-weight:600}
.tag-wrong{background:#fce7f3;color:#be185d}.tag-damaged{background:#fee2e2;color:#b91c1c}
.tag-missing{background:#fff7ed;color:#c2410c}.tag-defective{background:#fef3c7;color:#92400e}
.tag-other{background:#f1f5f9;color:#475569}
.tag-pending{background:#fef3c7;color:#92400e}.tag-resolved{background:#ecfdf5;color:#065f46}
.tag-refunded{background:#eff6ff;color:#1e40af}.tag-replaced{background:#f0fdf4;color:#166534}
.sop-item{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;background:#fff}
.sop-head{padding:16px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:.88rem;transition:background .1s}
.sop-head:hover{background:#fafbfc}
.sop-head .arrow{transition:transform .2s;color:var(--text3)}
.sop-item.open .sop-head .arrow{transform:rotate(90deg)}
.sop-body{display:none;padding:20px;border-top:1px solid var(--border);font-size:.82rem;line-height:1.8}
.sop-item.open .sop-body{display:block}
.sop-impact{display:inline-block;background:var(--pri-l);color:var(--pri-d);padding:3px 12px;border-radius:20px;font-size:.72rem;font-weight:600;margin-bottom:14px}
.sop-step{margin-bottom:8px;padding-left:22px;position:relative}
.sop-step::before{content:'';position:absolute;left:6px;top:9px;width:6px;height:6px;border-radius:50%;background:var(--pri)}
.sop-step .s-zh{font-weight:500}
.sop-step .s-en{color:var(--text2)}
.sop-tpl{background:#f8fafc;border-left:3px solid var(--pri);padding:12px 16px;margin:14px 0;border-radius:0 8px 8px 0;font-size:.8rem;color:var(--text2);white-space:pre-wrap}
.badge{display:inline-block;padding:2px 10px;border-radius:4px;font-size:.68rem;font-weight:600;background:var(--pri-l);color:var(--pri-d)}
.badge-staff{background:var(--ok-bg);color:var(--ok)}
.calc-box{background:var(--pri-l);border-radius:8px;padding:12px 16px;font-size:.82rem;color:var(--pri-d);margin:12px 0}
.detail-toggle{font-size:.8rem;color:var(--pri);cursor:pointer;margin:10px 0;display:inline-block}
.detail-toggle:hover{text-decoration:underline}
.toast{position:fixed;top:24px;right:24px;background:var(--sidebar);color:#fff;padding:12px 28px;border-radius:8px;font-size:.85rem;z-index:300;opacity:0;transition:opacity .3s;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.toast.show{opacity:1}
/* TODOS */
.todo-item{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:10px;transition:box-shadow .15s}
.todo-item:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.todo-item.status-open{border-left:4px solid var(--pri)}
.todo-item.status-claimed{border-left:4px solid var(--warn)}
.todo-item.status-done{border-left:4px solid var(--ok);opacity:.65}
.todo-item.status-archived{border-left:4px solid var(--text3);opacity:.45}
.todo-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.todo-title{font-size:.92rem;font-weight:600;flex:1}
.tbadge{padding:2px 10px;border-radius:20px;font-size:.65rem;font-weight:700}
.tbadge-open{background:var(--pri-l);color:var(--pri-d)}
.tbadge-claimed{background:var(--warn-bg);color:#92400e}
.tbadge-done{background:var(--ok-bg);color:#065f46}
.todo-meta{font-size:.72rem;color:var(--text3);margin-top:6px;display:flex;flex-wrap:wrap;gap:10px}
.todo-desc{font-size:.8rem;color:var(--text2);margin-top:8px;line-height:1.6}
.todo-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.tab-filter{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.tf-btn{padding:6px 16px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:.78rem;font-weight:600;cursor:pointer;color:var(--text2);transition:all .15s}
.tf-btn.active{background:var(--pri);color:#fff;border-color:var(--pri)}
.leaderboard-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f1f5f9}
.leaderboard-row:last-child{border:none}
.lb-rank{font-size:1.1rem;width:28px;text-align:center}
.lb-name{font-size:.88rem;font-weight:600}
.lb-bar{height:6px;background:var(--pri-l);border-radius:3px;margin-top:4px;min-width:60px}
.lb-bar-fill{height:6px;background:var(--pri);border-radius:3px;transition:width .4s}
.lb-count{font-size:.82rem;font-weight:700;color:var(--pri);white-space:nowrap}
/* Reminder modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center}
.modal-box{background:#fff;border-radius:16px;padding:32px 28px;width:480px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-box h2{font-size:1.2rem;margin-bottom:6px}
.modal-sub{font-size:.82rem;color:var(--text2);margin-bottom:20px}
.modal-todo-list{max-height:300px;overflow-y:auto}
.modal-todo-item{padding:10px 14px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;background:#fafbfc}
.modal-todo-item .mt-title{font-size:.88rem;font-weight:600}
.modal-todo-item .mt-meta{font-size:.72rem;color:var(--text3);margin-top:3px}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
@media(max-width:900px){
.sidebar{width:200px}.main{padding:20px}
.stats-row,.quick-actions{grid-template-columns:repeat(2,1fr)}
.form-row-3,.form-row-4{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div id="loginPage">
<div class="login-box">
<h1>&#x1F3EA; Online Store Manager</h1>
<p class="sub">店铺管理系统 &middot; Store Management System</p>
<div class="fg"><label>用户名 Username</label><input type="text" id="loginUser" autocomplete="username" autocapitalize="off"></div>
<div class="fg"><label>密码 Password</label><input type="password" id="loginPass" autocomplete="current-password"></div>
<button class="btn btn-pri" onclick="doLogin()">登录 Login</button>
<div class="err-msg" id="loginErr"></div>
</div>
</div>

<div id="app">
<div class="app-wrap">
<aside class="sidebar">
<div class="sidebar-brand"><h2>&#x1F3EA; TK Store</h2><p>Store Management System</p></div>
<nav class="sidebar-nav" id="sideNav"></nav>
<div class="sidebar-footer">
<div class="sf-name" id="sfName"></div>
<div class="sf-role" id="sfRole"></div>
<button onclick="doLogout()">退出登录 Logout</button>
</div>
</aside>
<div class="main"><div id="mainBody"></div></div>
</div>
</div>

<div class="toast" id="toast"></div>
<div id="reminderModal" class="modal-overlay hidden"></div>

<script>
const SB_URL='https://glohjxbpgqqzspytnbfm.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdsb2hqeGJwZ3FxenNweXRuYmZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwODkyODEsImV4cCI6MjA5MDY2NTI4MX0.DF10KD-ePvAoiZoEGpvai5w1HVQeUPYQIHuLa3YXCps';
let U=null,stores=[],staffList=[],currentTab='home',todoReminderTimer=null;

const sb={
  h:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY},
  async rpc(fn,p={}){const r=await fetch(SB_URL+'/rest/v1/rpc/'+fn,{method:'POST',headers:sb.h,body:JSON.stringify(p)});return r.json()},
  async get(t,q=''){const r=await fetch(SB_URL+'/rest/v1/'+t+'?'+q,{headers:sb.h});return r.json()},
  async post(t,d){const r=await fetch(SB_URL+'/rest/v1/'+t,{method:'POST',headers:{...sb.h,'Prefer':'return=representation'},body:JSON.stringify(d)});return r.json()},
  async patch(t,m,d){const p=Object.entries(m).map(([k,v])=>k+'=eq.'+v).join('&');const r=await fetch(SB_URL+'/rest/v1/'+t+'?'+p,{method:'PATCH',headers:{...sb.h,'Prefer':'return=representation'},body:JSON.stringify(d)});return r.json()},
  async upsert(t,d){const r=await fetch(SB_URL+'/rest/v1/'+t,{method:'POST',headers:{...sb.h,'Prefer':'return=representation,resolution=merge-duplicates'},body:JSON.stringify(d)});return r.json()},
  async del(t,m){const p=Object.entries(m).map(([k,v])=>k+'=eq.'+v).join('&');return fetch(SB_URL+'/rest/v1/'+t+'?'+p,{method:'DELETE',headers:sb.h})}
};

const TASKS=[
  {p:'morning',k:'msg1',zh:'检查并回复所有客户消息',en:'Check & reply ALL customer messages',icon:'💬'},
  {p:'morning',k:'aftersale',zh:'检查新的售后请求并分类处理',en:'Check new after-sales requests and handle',icon:'📋'},
  {p:'morning',k:'orders',zh:'检查即将超时的待发货订单',en:'Check orders near auto-cancel deadline',icon:'📦'},
  {p:'afternoon',k:'msg2',zh:'再次检查未回复的客户消息',en:'Second check: reply unreplied messages',icon:'💬'},
  {p:'afternoon',k:'reviews',zh:'检查新的1-2星差评并按SOP处理',en:'Check new 1-2 star reviews, follow SOP',icon:'⭐'},
  {p:'afternoon',k:'returns',zh:'检查新的退货退款请求，记录原因',en:'Check new return/refund requests, log reasons',icon:'🔄'},
  {p:'evening',k:'msg3',zh:'最后一轮消息检查，确保零未读',en:'Final message sweep — ensure ZERO unread',icon:'✅'},
  {p:'evening',k:'logissues',zh:'登记当天发现的问题到问题日志',en:'Log all issues found today in Issue Log',icon:'📝'},
  {p:'evening',k:'scores',zh:'如Store Rating有更新，记录分数',en:'Record Store Rating if updated today',icon:'📊'},
];
const PERIODS={
  morning:{zh:'☀️ 早班 9:00前',en:'Morning before 9:00'},
  afternoon:{zh:'🌤️ 午间 13:00-14:00',en:'Afternoon 13:00-14:00'},
  evening:{zh:'🌙 下班前 17:00',en:'Evening before 17:00'}
};
const ISSUE_TYPES=[
  {v:'wrong_item',zh:'发错货',en:'Wrong Item'},
  {v:'damaged',zh:'破损',en:'Damaged'},
  {v:'missing_item',zh:'缺件',en:'Missing Item'},
  {v:'defective',zh:'瑕疵品',en:'Defective'},
  {v:'other',zh:'其他',en:'Other'}
];
const RESULTS=[
  {v:'pending',zh:'处理中',en:'Pending'},
  {v:'resolved',zh:'已解决',en:'Resolved'},
  {v:'refunded',zh:'已退款',en:'Refunded'},
  {v:'replaced',zh:'已补发',en:'Replaced'}
];

const today=()=>new Date().toISOString().slice(0,10);
const sColor=v=>v>=4?'sv-good':v>=3?'sv-mid':'sv-bad';
const pClass=(d,t)=>d===t?'p-full':d>0?'p-partial':'p-none';
const issueTag=t=>{const cls={wrong_item:'wrong',damaged:'damaged',missing_item:'missing',defective:'defective',other:'other'};const i=ISSUE_TYPES.find(x=>x.v===t);return '<span class="tag tag-'+(cls[t]||'other')+'">'+(i?i.zh+' '+i.en:t)+'</span>'};
const resultTag=r=>{const i=RESULTS.find(x=>x.v===r);return '<span class="tag tag-'+r+'">'+(i?i.zh+' '+i.en:r)+'</span>'};
const storeOpts=(sel='')=>'<option value="">-- 选择店铺 Select Store --</option>'+stores.map(s=>'<option value="'+s.id+'"'+(s.id===sel?' selected':'')+'>'+s.store_name+'</option>').join('');
const staffOpts=(sel='')=>'<option value="">-- 未指派 Unassigned --</option>'+staffList.map(s=>'<option value="'+s.id+'"'+(s.id===sel?' selected':'')+'>'+s.display_name+'</option>').join('');
const staffName=id=>{if(!id)return '—';const s=staffList.find(x=>x.id===id);return s?s.display_name:'—'};
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function timeAgo(ts){
  if(!ts)return '';
  const diff=Math.floor((Date.now()-new Date(ts))/1000);
  if(diff<60)return '刚刚 Just now';
  if(diff<3600)return Math.floor(diff/60)+'分钟前 mins ago';
  if(diff<86400)return Math.floor(diff/3600)+'小时前 hrs ago';
  return Math.floor(diff/86400)+'天前 days ago';
}

async function doLogin(){
  const u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPass').value,err=document.getElementById('loginErr');
  if(!u||!p){err.textContent='请输入用户名和密码';return}
  err.textContent='登录中...';
  try{const r=await sb.rpc('tks_authenticate',{p_username:u,p_password:p});
    if(r.success){U=r.user;sessionStorage.setItem('tks_u',JSON.stringify(U));initApp()}
    else err.textContent=r.message||'Login failed';
  }catch(e){err.textContent='网络错误: '+e.message}
}
function doLogout(){
  U=null;sessionStorage.removeItem('tks_u');
  if(todoReminderTimer)clearInterval(todoReminderTimer);
  document.getElementById('app').style.display='none';
  document.getElementById('loginPage').style.display='flex';
  document.getElementById('loginPass').value='';
  document.getElementById('loginErr').textContent='';
}
function autoLogin(){const s=sessionStorage.getItem('tks_u');if(s)try{U=JSON.parse(s);initApp()}catch(e){}}

async function initApp(){
  document.getElementById('loginPage').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('sfName').textContent=U.display_name;
  document.getElementById('sfRole').textContent=U.role==='admin'?'管理员 Admin':'员工 Staff';
  await loadData();buildNav();go('home');
  checkTodoReminder();
  todoReminderTimer=setInterval(checkTodoReminder,3*60*60*1000);
}
async function loadData(){
  stores=await sb.get('tks_stores','is_active=eq.true&order=store_name');
  if(!Array.isArray(stores))stores=[];
  try{const r=await sb.rpc('tks_get_staff_list');staffList=Array.isArray(r)?r:[]}catch(e){staffList=[]}
  if(!Array.isArray(staffList))staffList=[];
}
function myStores(){return U.role==='admin'?stores:stores.filter(s=>s.assigned_to===U.id)}

/* ---- TODO REMINDER ---- */
async function checkTodoReminder(){
  try{
    const all=await sb.get('tks_todos','status=in.(open,claimed)&order=created_at.asc');
    if(!Array.isArray(all)||all.length===0)return;
    const mine=all.filter(t=>t.assigned_to===U.id||(!t.assigned_to&&t.status==='open')||t.claimed_by===U.id);
    if(mine.length===0)return;
    showReminderModal(mine);
  }catch(e){console.error('reminder error',e)}
}
function showReminderModal(todos){
  const modal=document.getElementById('reminderModal');
  modal.classList.remove('hidden');
  const listHtml=todos.map(t=>`
    <div class="modal-todo-item">
      <div class="mt-title">${esc(t.title)}</div>
      <div class="mt-meta">创建人 By: ${staffName(t.created_by)} &middot; ${t.assigned_to?'指定给 '+staffName(t.assigned_to):'任何人可认领 Open to anyone'} &middot; ${timeAgo(t.created_at)}</div>
      ${t.description?'<div style="font-size:.78rem;color:var(--text2);margin-top:4px">'+esc(t.description)+'</div>':''}
    </div>`).join('');
  modal.innerHTML=`<div class="modal-box">
    <h2>📋 待办提醒 Todo Reminder</h2>
    <div class="modal-sub">你有 <b>${todos.length}</b> 条待处理待办 &middot; You have <b>${todos.length}</b> pending todo(s)</div>
    <div class="modal-todo-list">${listHtml}</div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="document.getElementById('reminderModal').classList.add('hidden')">稍后 Later</button>
      <button class="btn btn-pri" style="width:auto" onclick="document.getElementById('reminderModal').classList.add('hidden');go('todos')">去处理 Go to Todos</button>
    </div>
  </div>`;
}

/* ---- TODOS ---- */
let todoFilter='mine';
function renderTodoCard(t,compact=false){
  const statusLabel={open:'待认领 Open',claimed:'处理中 In Progress',done:'已完成 Done',archived:'已归档'};
  const statusCls={open:'tbadge-open',claimed:'tbadge-claimed',done:'tbadge-done',archived:'tbadge-done'};
  const isAdmin=U.role==='admin';
  let actions='';
  if(t.status!=='done'&&t.status!=='archived'){
    if(t.status==='open')actions+=`<button class="btn btn-ghost btn-sm" onclick="claimTodo('${t.id}')">🙋 认领 Claim</button>`;
    if((t.claimed_by===U.id||t.assigned_to===U.id||isAdmin))actions+=`<button class="btn btn-ok btn-sm" onclick="doneTodo('${t.id}')">✅ 完成 Done</button>`;
    if(t.created_by===U.id||isAdmin)actions+=`<button class="btn btn-bad btn-sm" onclick="archiveTodo('${t.id}')">🗑️ 归档</button>`;
  }
  return `<div class="todo-item status-${t.status}">
    <div class="todo-header">
      <div class="todo-title">${esc(t.title)}</div>
      <span class="tbadge ${statusCls[t.status]||'tbadge-open'}">${statusLabel[t.status]||t.status}</span>
    </div>
    ${t.description?`<div class="todo-desc">${esc(t.description)}</div>`:''}
    <div class="todo-meta">
      <span>✍️ 创建: ${staffName(t.created_by)}</span>
      <span>🎯 ${t.assigned_to?'指定: '+staffName(t.assigned_to):'任何人可认领 Open'}</span>
      ${t.claimed_by?`<span>🙋 认领: ${staffName(t.claimed_by)}</span>`:''}
      ${t.completed_by?`<span>✅ 完成: ${staffName(t.completed_by)}</span>`:''}
      <span>🕐 ${timeAgo(t.created_at)}</span>
    </div>
    ${compact?'':`<div class="todo-actions">${actions}</div>`}
  </div>`;
}

async function rTodos(el){
  const all=await sb.get('tks_todos','order=created_at.desc&limit=300');
  const todos=Array.isArray(all)?all:[];

  // Leaderboard
  const creatorMap={},completerMap={};
  todos.forEach(t=>{
    if(t.created_by)creatorMap[t.created_by]=(creatorMap[t.created_by]||0)+1;
    if(t.completed_by)completerMap[t.completed_by]=(completerMap[t.completed_by]||0)+1;
  });
  const topC=Object.entries(creatorMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const topD=Object.entries(completerMap).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const mine=todos.filter(t=>!['done','archived'].includes(t.status)&&(t.assigned_to===U.id||(!t.assigned_to&&t.status==='open')||t.claimed_by===U.id));
  const open=todos.filter(t=>t.status==='open');
  const inprog=todos.filter(t=>t.status==='claimed');
  const done=todos.filter(t=>t.status==='done');
  const allActive=todos.filter(t=>t.status!=='archived');

  const filterMap={mine,open,inprogress:inprog,done,all:allActive};
  const labels={mine:'我的 Mine ('+mine.length+')',open:'待认领 Open ('+open.length+')',inprogress:'处理中 In Progress ('+inprog.length+')',done:'已完成 Done ('+done.length+')',all:'全部 All ('+allActive.length+')'};
  const current=filterMap[todoFilter]||mine;

  const medals=['🥇','🥈','🥉','4️⃣','5️⃣'];
  const mkLb=(entries,max)=>entries.map(([uid,cnt],i)=>`
    <div class="leaderboard-row">
      <div class="lb-rank">${medals[i]||i+1}</div>
      <div style="flex:1"><div class="lb-name">${staffName(uid)}</div>
      <div class="lb-bar"><div class="lb-bar-fill" style="width:${max?Math.round(cnt/max*100):0}%"></div></div></div>
      <div class="lb-count">${cnt} 条</div>
    </div>`).join('');

  let h=`<div class="main-header"><h1>📋 待办事项</h1><p>Todo List &middot; Task Tracker</p></div>`;
  h+=`<div class="card"><h3>➕ 创建待办 Create Todo</h3>
    <div class="fg" style="margin-top:14px"><label>标题 Title *</label><input type="text" id="tdTitle" placeholder="简明描述要做的事 Brief task description..."></div>
    <div class="fg"><label>详细说明 Description (选填 Optional)</label><textarea id="tdDesc" placeholder="补充说明..."></textarea></div>
    <div class="fg"><label>指定给 Assign To (选填 — 不填则所有人可认领)</label><select id="tdAssign">${staffOpts()}</select></div>
    <button class="btn btn-pri" onclick="createTodo()" style="max-width:240px">➕ 创建 Create</button>
  </div>`;

  h+='<div class="form-row">';
  h+=`<div class="card"><h3>🏆 创建最多 Top Creators</h3>${topC.length?mkLb(topC,topC[0]?.[1]):'<div style="color:var(--text3);font-size:.82rem;padding:8px 0">暂无数据 No data</div>'}</div>`;
  h+=`<div class="card"><h3>⚡ 完成最多 Top Completers</h3>${topD.length?mkLb(topD,topD[0]?.[1]):'<div style="color:var(--text3);font-size:.82rem;padding:8px 0">暂无数据 No data</div>'}</div>`;
  h+='</div>';

  h+='<div class="tab-filter">';
  for(const [k,label] of Object.entries(labels))
    h+=`<button class="tf-btn${todoFilter===k?' active':''}" onclick="setTodoFilter('${k}')">${label}</button>`;
  h+='</div>';

  if(current.length===0)h+='<div class="card" style="text-align:center;color:var(--text3);padding:32px">暂无待办 No todos here</div>';
  else h+=current.map(t=>renderTodoCard(t)).join('');
  el.innerHTML=h;
}

function setTodoFilter(f){todoFilter=f;rTodos(document.getElementById('mainBody'));}

async function createTodo(){
  const title=document.getElementById('tdTitle').value.trim();
  if(!title){toast('请填写待办标题');return}
  const d={title,description:document.getElementById('tdDesc').value.trim()||null,created_by:U.id,assigned_to:document.getElementById('tdAssign').value||null,status:'open'};
  try{
    const r=await sb.post('tks_todos',d);
    if(Array.isArray(r)&&r.length>0){
      toast('✅ 待办已创建 Todo created!');
      document.getElementById('tdTitle').value='';
      document.getElementById('tdDesc').value='';
      document.getElementById('tdAssign').value='';
      updateTodoBadge();rTodos(document.getElementById('mainBody'));
    }else toast('❌ 创建失败: '+(r.message||JSON.stringify(r)));
  }catch(e){toast('❌ 网络错误')}
}
async function claimTodo(id){
  try{await sb.patch('tks_todos',{id},{claimed_by:U.id,claimed_at:new Date().toISOString(),status:'claimed'});
    toast('✅ 已认领 Claimed!');updateTodoBadge();rTodos(document.getElementById('mainBody'));}
  catch(e){toast('❌ 操作失败')}
}
async function doneTodo(id){
  try{await sb.patch('tks_todos',{id},{completed_by:U.id,completed_at:new Date().toISOString(),status:'done'});
    toast('🎉 已完成 Done!');updateTodoBadge();rTodos(document.getElementById('mainBody'));}
  catch(e){toast('❌ 操作失败')}
}
async function archiveTodo(id){
  if(!confirm('确认归档这条待办？\nArchive this todo?'))return;
  try{await sb.patch('tks_todos',{id},{status:'archived'});
    toast('🗑️ 已归档');updateTodoBadge();rTodos(document.getElementById('mainBody'));}
  catch(e){toast('❌ 操作失败')}
}

/* ---- TASKS ---- */
async function rTasks(el){
  const ms=myStores();
  const checks=await sb.get('tks_checklist','check_date=eq.'+today()+'&completed=eq.true');
  const ck=Array.isArray(checks)?checks:[];
  let h=`<div class="main-header"><h1>✅ 今日任务清单</h1><p>Today's Checklist — ${today()}</p></div>`;
  if(U.role==='admin'){
    h+='<div class="sec-title">📋 团队概览 Team Overview</div>';
    const sm={};
    staffList.filter(s=>s.is_active).forEach(s=>{sm[s.id]={name:s.display_name,stores:stores.filter(st=>st.assigned_to===s.id),done:0,total:0}});
    for(const uid in sm){const u=sm[uid];u.total=u.stores.length*TASKS.length;u.done=ck.filter(c=>c.completed_by===uid).length;}
    for(const uid in sm){const u=sm[uid];if(!u.stores.length)continue;const pc=pClass(u.done,u.total);
      h+=`<div class="staff-overview"><div class="staff-ov-header" onclick="this.nextElementSibling.classList.toggle('hidden')">
        <h4>👤 ${u.name}</h4><span class="progress ${pc}">${u.done}/${u.total}</span></div>
        <div class="staff-ov-detail hidden">`;
      for(const st of u.stores){const d=ck.filter(c=>c.completed_by===uid&&c.store_id===st.id).length;
        h+=`<div class="staff-store-row"><span>🏪 ${esc(st.store_name)}</span><span class="progress ${pClass(d,TASKS.length)}">${d}/${TASKS.length}</span></div>`}
      h+='</div></div>';}
    h+='<div class="nav-sep" style="margin:20px 0;border-color:var(--border)"></div>';}
  h+='<div class="sec-title">'+(U.role==='admin'?'我的任务 My Tasks':'我负责的店铺 My Assigned Stores')+'</div>';
  if(!ms.length){h+='<div class="card" style="text-align:center;color:var(--text3);padding:40px">暂无指派的店铺<br>No stores assigned to you</div>';el.innerHTML=h;return}
  for(const store of ms){
    const storeCk=ck.filter(c=>c.completed_by===U.id&&c.store_id===store.id);
    const doneKeys=new Set(storeCk.map(c=>c.task_key));const done=doneKeys.size;
    h+=`<div class="store-checklist"><div class="store-cl-header" onclick="this.nextElementSibling.classList.toggle('hidden')">
      <h4>🏪 ${esc(store.store_name)}</h4><span class="progress ${pClass(done,TASKS.length)}">${done}/${TASKS.length}</span></div>
      <div class="store-cl-body">`;
    let lp='';
    for(const t of TASKS){
      if(t.p!==lp){lp=t.p;const pl=PERIODS[t.p];h+=`<div class="period-label">${pl.zh} · ${pl.en}</div>`}
      const d=doneKeys.has(t.k);
      h+=`<div class="ck-item${d?' done':''}" onclick="toggleCk('${t.k}','${store.id}',${!d})">
        <div class="ck-box">${d?'✓':''}</div>
        <div class="ck-txt"><div class="t-zh">${t.icon} ${t.zh}</div><div class="t-en">${t.en}</div>
        ${d?'<div class="ck-time">✓ Done</div>':''}</div></div>`}
    h+='</div></div>';}
  el.innerHTML=h;
}
async function toggleCk(key,storeId,complete){
  if(complete)await sb.upsert('tks_checklist',{check_date:today(),task_key:key,store_id:storeId,completed:true,completed_by:U.id,completed_at:new Date().toISOString()});
  else await sb.del('tks_checklist',{check_date:today(),task_key:key,completed_by:U.id,store_id:storeId});
  rTasks(document.getElementById('mainBody'));
}

function calcSc(){
  const p=parseFloat(document.getElementById('sP').value)||0,f=parseFloat(document.getElementById('sF').value)||0,s=parseFloat(document.getElementById('sS').value)||0;
  if(p||f||s){const c=(p*.45+f*.40+s*.15).toFixed(1);
    document.getElementById('calcBox').innerHTML='公式: <b>'+p+'</b>×45% + <b>'+f+'</b>×40% + <b>'+s+'</b>×15% = <b style="font-size:1.1em">'+c+'</b>';
    if(!document.getElementById('sO').value)document.getElementById('sO').value=c;}
}
async function saveSc(){
  const sid=document.getElementById('scStore').value;if(!sid){toast('请选择店铺');return}

    overall_score:parseFloat(document.getElementById('sO').value)||null,
    product_satisfaction:parseFloat(document.getElementById('sP').value)||null,
    fulfillment:parseFloat(document.getElementById('sF').value)||null,
    customer_service:parseFloat(document.getElementById('sS').value)||null,
    negative_review_rate:parseFloat(document.getElementById('sNR').value)||null,
    rr_rate:parseFloat(document.getElementById('sRR').value)||null,
    fdr:parseFloat(document.getElementById('sFDR').value)||null,
    sfcr:parseFloat(document.getElementById('sSFCR').value)||null,
    complaint_rate:parseFloat(document.getElementById('sCR').value)||null,

}
async function loadHistory(){

  if(!u||!d||!p){toast('请填写所有字段');return}if(p.length<6){toast('密码至少6位');return}
  const res=await sb.rpc('tks_create_user',{p_admin_id:U.id,p_username:u,p_password:p,p_display_name:d,p_role:r});
  if(res.success){toast('✅ 用户已创建!');['nuName','nuDisplay','nuPass'].forEach(i=>document.getElementById(i).value='');await loadData();rUsers(document.getElementById('mainBody'));}
  else toast('❌ '+res.message);
}
async function resetPw(id,name){const p=prompt('为 '+name+' 设置新密码:');if(!p)return;if(p.length<6){toast('密码至少6位');return}
  const r=await sb.rpc('tks_update_user',{p_admin_id:U.id,p_user_id:id,p_password:p});r.success?toast('✅ 密码已重置'):toast('❌ '+r.message);}
async function toggleUsr(id,active,name){if(!confirm((active?'禁用':'启用')+' '+name+'?'))return;
  const r=await sb.rpc('tks_update_user',{p_admin_id:U.id,p_user_id:id,p_is_active:!active});if(r.success){toast('✅ 已更新');await loadData();rUsers(document.getElementById('mainBody'));}}
async function chgPw(){const o=document.getElementById('cpOld').value,n=document.getElementById('cpNew').value;
  if(!o||!n){toast('请填写密码');return}if(n.length<6){toast('新密码至少6位');return}
  const r=await sb.rpc('tks_change_password',{p_user_id:U.id,p_old_password:o,p_new_password:n});
  if(r.success){toast('✅ 密码已修改');document.getElementById('cpOld').value='';document.getElementById('cpNew').value='';}else toast('❌ '+r.message);}

document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('loginUser').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('loginPass').focus();});
autoLogin();
</script>
