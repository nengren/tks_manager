<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TK Store Manager 店铺管理</title>
<style>
:root{--pri:#0ea5e9;--pri-d:#0284c7;--bg:#f0f4f8;--card:#fff;--text:#1e293b;--text2:#64748b;--text3:#94a3b8;
--ok:#10b981;--ok-bg:#ecfdf5;--warn:#f59e0b;--warn-bg:#fffbeb;--bad:#ef4444;--bad-bg:#fef2f2;
--border:#e2e8f0;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);
min-height:100vh;-webkit-tap-highlight-color:transparent}
.hidden{display:none!important}

/* Login */
#loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(135deg,#0ea5e9 0%,#06b6d4 100%)}
.login-box{background:#fff;border-radius:16px;padding:40px 32px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.login-box h1{font-size:1.5rem;text-align:center;margin-bottom:4px}
.login-box .sub{text-align:center;color:var(--text2);font-size:.85rem;margin-bottom:28px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 14px;border:1.5px solid var(--border);
border-radius:8px;font-size:.95rem;outline:none;transition:border .2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--pri)}
.form-group textarea{resize:vertical;min-height:60px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border:none;
border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .15s;width:100%}
.btn-pri{background:var(--pri);color:#fff}.btn-pri:hover{background:var(--pri-d)}
.btn-ok{background:var(--ok);color:#fff}
.btn-bad{background:var(--bad);color:#fff}
.btn-ghost{background:transparent;color:var(--text2);border:1.5px solid var(--border)}
.btn-sm{padding:6px 14px;font-size:.8rem;width:auto}
.err-msg{color:var(--bad);font-size:.8rem;text-align:center;margin-top:12px;min-height:20px}

/* App Layout */
#app{display:none;height:100vh;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;
justify-content:space-between;flex-shrink:0}
.topbar h2{font-size:1rem}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-right .user-name{font-size:.8rem;color:var(--text2)}
.topbar-right button{background:none;border:none;color:var(--text2);cursor:pointer;font-size:.8rem}
.main-content{flex:1;overflow-y:auto;padding:16px;padding-bottom:80px}
.tab-content{display:none}.tab-content.active{display:block}

/* Bottom Nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);
display:flex;padding:6px 0 env(safe-area-inset-bottom,8px);z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;
cursor:pointer;color:var(--text3);font-size:.65rem;transition:color .15s;border:none;background:none}
.nav-item.active{color:var(--pri)}
.nav-item .nav-icon{font-size:1.3rem}

/* Cards */
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.card h3{font-size:.95rem;margin-bottom:4px}
.card .label-en{font-size:.75rem;color:var(--text3);margin-bottom:10px}
.section-title{font-size:.85rem;font-weight:700;color:var(--text2);margin:16px 0 8px;text-transform:uppercase;letter-spacing:.5px}

/* Stats Row */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat-card{background:var(--card);border-radius:10px;padding:14px 10px;text-align:center;box-shadow:var(--shadow)}
.stat-val{font-size:1.4rem;font-weight:700}
.stat-label{font-size:.65rem;color:var(--text2);margin-top:2px}

/* Quick Actions */
.quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.action-btn{background:var(--card);border:2px solid var(--border);border-radius:var(--radius);padding:20px 12px;
text-align:center;cursor:pointer;transition:all .15s}
.action-btn:active{transform:scale(.97);border-color:var(--pri)}
.action-btn .action-icon{font-size:2rem;margin-bottom:6px}
.action-btn .action-zh{font-size:.9rem;font-weight:600}
.action-btn .action-en{font-size:.7rem;color:var(--text2)}

/* Checklist */
.check-period{font-size:.8rem;font-weight:700;color:var(--pri);margin:14px 0 6px;display:flex;align-items:center;gap:6px}
.check-item{display:flex;align-items:flex-start;gap:10px;padding:12px;border-bottom:1px solid var(--border);cursor:pointer}
.check-item:last-child{border:none}
.check-box{width:26px;height:26px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;display:flex;
align-items:center;justify-content:center;font-size:14px;transition:all .2s;margin-top:2px}
.check-item.done .check-box{background:var(--ok);border-color:var(--ok);color:#fff}
.check-text .zh{font-size:.85rem;font-weight:500}
.check-text .en{font-size:.72rem;color:var(--text3)}
.check-time{font-size:.65rem;color:var(--text3);margin-top:2px}

/* Score Form */
.score-group{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.score-group .form-group{margin-bottom:8px}
.score-calc{background:#f0f9ff;border-radius:8px;padding:10px 14px;font-size:.8rem;color:var(--pri-d);margin:10px 0}
.detail-toggle{font-size:.8rem;color:var(--pri);cursor:pointer;margin:8px 0;display:inline-block}

/* Issue Type Tags */
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:600}
.tag-wrong{background:#fce7f3;color:#be185d}.tag-damaged{background:#fee2e2;color:#b91c1c}
.tag-missing{background:#fff7ed;color:#c2410c}.tag-defective{background:#fef3c7;color:#92400e}
.tag-other{background:#f1f5f9;color:#475569}
.tag-pending{background:#fef3c7;color:#92400e}.tag-resolved{background:#ecfdf5;color:#065f46}
.tag-refunded{background:#eff6ff;color:#1e40af}.tag-replaced{background:#f0fdf4;color:#166534}

/* Issue List Item */
.issue-item{padding:10px 0;border-bottom:1px solid var(--border)}
.issue-item:last-child{border:none}
.issue-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.issue-store{font-weight:600;font-size:.8rem}
.issue-date{font-size:.7rem;color:var(--text3)}
.issue-order{font-size:.75rem;color:var(--text2)}
.issue-desc{font-size:.75rem;color:var(--text2);margin-top:4px}

/* SOP */
.sop-item{border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden}
.sop-header{padding:14px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;
background:#fafbfc;font-weight:600;font-size:.85rem}
.sop-header .arrow{transition:transform .2s}
.sop-item.open .sop-header .arrow{transform:rotate(90deg)}
.sop-body{display:none;padding:16px;font-size:.82rem;line-height:1.7}
.sop-item.open .sop-body{display:block}
.sop-impact{display:inline-block;background:#eff6ff;color:#2563eb;padding:2px 10px;border-radius:20px;
font-size:.7rem;font-weight:600;margin-bottom:10px}
.sop-step{margin-bottom:6px;padding-left:20px;position:relative}
.sop-step::before{content:'';position:absolute;left:6px;top:8px;width:6px;height:6px;border-radius:50%;background:var(--pri)}
.sop-template{background:#f8fafc;border-left:3px solid var(--pri);padding:10px 14px;margin:10px 0;border-radius:0 6px 6px 0;
font-size:.78rem;color:var(--text2);white-space:pre-wrap}

/* Admin Lists */
.list-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.list-item:last-child{border:none}
.list-item .name{font-weight:600;font-size:.85rem}
.list-item .meta{font-size:.72rem;color:var(--text2)}
.list-item .actions{display:flex;gap:6px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.65rem;font-weight:600;
background:#eff6ff;color:#2563eb}
.badge-staff{background:#f0fdf4;color:#166534}

/* Score History */
.score-row{display:grid;grid-template-columns:80px repeat(4,1fr);gap:4px;padding:8px 0;border-bottom:1px solid var(--border);
font-size:.75rem;align-items:center}
.score-row.header{font-weight:700;color:var(--text2);font-size:.68rem}
.score-val{text-align:center}
.score-good{color:var(--ok)}.score-mid{color:var(--warn)}.score-bad{color:var(--bad)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:24px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto}
.modal h3{margin-bottom:16px}

/* Responsive */
@media(min-width:768px){
.main-content{max-width:720px;margin:0 auto;padding-bottom:20px}
.bottom-nav{position:static;max-width:720px;margin:0 auto;border-radius:12px;margin-bottom:12px;border:1px solid var(--border)}
.modal{border-radius:16px}
.modal-overlay{align-items:center}
}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 24px;
border-radius:8px;font-size:.85rem;z-index:300;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- Login Page -->
<div id="loginPage">
<div class="login-box">
<h1>🏪 TK Store Manager</h1>
<p class="sub">店铺管理系统 / Store Management</p>
<div class="form-group">
<label>用户名 / Username</label>
<input type="text" id="loginUser" autocomplete="username" autocapitalize="off">
</div>
<div class="form-group">
<label>密码 / Password</label>
<input type="password" id="loginPass" autocomplete="current-password">
</div>
<button class="btn btn-pri" onclick="doLogin()">登录 / Login</button>
<div class="err-msg" id="loginErr"></div>
</div>
</div>

<!-- Main App -->
<div id="app" style="display:none">
<div class="topbar">
<h2>🏪 TK Store</h2>
<div class="topbar-right">
<span class="user-name" id="userName"></span>
<button onclick="doLogout()">退出/Logout</button>
</div>
</div>
<div class="main-content">
<div id="tab-home" class="tab-content active"></div>
<div id="tab-tasks" class="tab-content"></div>
<div id="tab-score" class="tab-content"></div>
<div id="tab-issues" class="tab-content"></div>
<div id="tab-sop" class="tab-content"></div>
<div id="tab-stores" class="tab-content"></div>
<div id="tab-users" class="tab-content"></div>
</div>
<nav class="bottom-nav" id="bottomNav"></nav>
</div>

<div class="toast" id="toast"></div>

<script>
// ========================================
// CONFIG
// ========================================
const SUPABASE_URL='https://glohjxbpgqqzspytnbfm.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdsb2hqeGJwZ3FxenNweXRuYmZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwODkyODEsImV4cCI6MjA5MDY2NTI4MX0.DF10KD-ePvAoiZoEGpvai5w1HVQeUPYQIHuLa3YXCps';

// State
let currentUser=null;
let stores=[];
let currentTab='home';

// ========================================
// SUPABASE CLIENT (lightweight)
// ========================================
const sb={
  async rpc(fn,params={}){
    const r=await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`,{
      method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`},
      body:JSON.stringify(params)
    });
    return r.json();
  },
  async select(table,query=''){
    const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}`,{
      headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
    });
    return r.json();
  },
  async insert(table,data){
    const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}`,{
      method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,
        'Authorization':`Bearer ${SUPABASE_KEY}`,'Prefer':'return=representation'},
      body:JSON.stringify(data)
    });
    return r.json();
  },
  async update(table,match,data){
    const params=Object.entries(match).map(([k,v])=>`${k}=eq.${v}`).join('&');
    const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`,{
      method:'PATCH',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,
        'Authorization':`Bearer ${SUPABASE_KEY}`,'Prefer':'return=representation'},
      body:JSON.stringify(data)
    });
    return r.json();
  },
  async upsert(table,data){
    const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}`,{
      method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,
        'Authorization':`Bearer ${SUPABASE_KEY}`,'Prefer':'return=representation,resolution=merge-duplicates'},
      body:JSON.stringify(data)
    });
    return r.json();
  },
  async del(table,match){
    const params=Object.entries(match).map(([k,v])=>`${k}=eq.${v}`).join('&');
    return fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`,{
      method:'DELETE',headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
    });
  }
};

// ========================================
// TASKS DEFINITION
// ========================================
const TASKS=[
  {period:'morning',key:'morning_msg',zh:'检查并回复所有店铺客户消息',en:'Check & reply ALL customer messages across all stores',icon:'💬'},
  {period:'morning',key:'morning_after',zh:'检查新的售后请求并分类处理',en:'Check new after-sales requests and categorize',icon:'📋'},
  {period:'morning',key:'morning_orders',zh:'检查即将超时的待发货订单',en:'Check orders near auto-cancel deadline',icon:'📦'},
  {period:'afternoon',key:'mid_msg',zh:'再次检查未回复的客户消息',en:'Second round: check unreplied messages',icon:'💬'},
  {period:'afternoon',key:'mid_reviews',zh:'检查新的1-2星差评，按SOP处理',en:'Check new 1-2 star reviews, follow SOP',icon:'⭐'},
  {period:'afternoon',key:'mid_returns',zh:'检查新的退货退款请求，记录原因',en:'Check new return/refund requests, log reasons',icon:'🔄'},
  {period:'evening',key:'eve_msg',zh:'最后一轮消息回复，确保零未读',en:'Final message sweep - ensure ZERO unread',icon:'✅'},
  {period:'evening',key:'eve_summary',zh:'登记当天发现的问题到问题日志',en:'Log all issues found today in Issue Log',icon:'📝'},
  {period:'evening',key:'eve_scores',zh:'如Store Rating有更新，记录分数',en:'Record Store Rating scores if updated',icon:'📊'},
];

const ISSUE_TYPES=[
  {value:'wrong_item',zh:'发错货',en:'Wrong Item'},
  {value:'damaged',zh:'破损',en:'Damaged'},
  {value:'missing_item',zh:'缺件',en:'Missing Item'},
  {value:'defective',zh:'瑕疵品',en:'Defective'},
  {value:'other',zh:'其他',en:'Other'},
];

const RESULTS=[
  {value:'pending',zh:'处理中',en:'Pending'},
  {value:'resolved',zh:'已解决',en:'Resolved'},
  {value:'refunded',zh:'已退款',en:'Refunded'},
  {value:'replaced',zh:'已补发',en:'Replaced'},
];

const PERIOD_LABELS={morning:{zh:'☀️ 早班 9:00前',en:'Morning before 9:00'},
  afternoon:{zh:'🌤️ 午间 13:00-14:00',en:'Afternoon 13:00-14:00'},
  evening:{zh:'🌙 下班前 17:00',en:'Evening before 17:00'}};

// ========================================
// AUTH
// ========================================
async function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value;
  const err=document.getElementById('loginErr');
  if(!u||!p){err.textContent='请输入用户名和密码 / Please enter username and password';return;}
  err.textContent='登录中... / Logging in...';
  try{
    const res=await sb.rpc('tks_authenticate',{p_username:u,p_password:p});
    if(res.success){
      currentUser=res.user;
      sessionStorage.setItem('tks_user',JSON.stringify(res.user));
      showApp();
    }else{err.textContent=res.message||'Login failed';}
  }catch(e){err.textContent='网络错误 / Network error: '+e.message;}
}

function doLogout(){
  currentUser=null;
  sessionStorage.removeItem('tks_user');
  document.getElementById('app').style.display='none';
  document.getElementById('loginPage').style.display='flex';
  document.getElementById('loginPass').value='';
  document.getElementById('loginErr').textContent='';
}

function tryAutoLogin(){
  const saved=sessionStorage.getItem('tks_user');
  if(saved){try{currentUser=JSON.parse(saved);showApp();}catch(e){}}
}

// ========================================
// APP INIT
// ========================================
async function showApp(){
  document.getElementById('loginPage').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('userName').textContent=currentUser.display_name;
  buildNav();
  await loadStores();
  switchTab('home');
}

function buildNav(){
  const isAdmin=currentUser.role==='admin';
  let tabs=[
    {id:'home',icon:'🏠',zh:'首页',en:'Home'},
    {id:'tasks',icon:'✅',zh:'任务',en:'Tasks'},
    {id:'score',icon:'📊',zh:'分数',en:'Score'},
    {id:'issues',icon:'⚠️',zh:'问题',en:'Issues'},
    {id:'sop',icon:'📖',zh:'SOP',en:'SOP'},
  ];
  if(isAdmin){
    tabs.push({id:'stores',icon:'🏪',zh:'店铺',en:'Stores'});
    tabs.push({id:'users',icon:'👥',zh:'用户',en:'Users'});
  }
  document.getElementById('bottomNav').innerHTML=tabs.map(t=>
    `<button class="nav-item${t.id===currentTab?' active':''}" onclick="switchTab('${t.id}')">
      <span class="nav-icon">${t.icon}</span>${t.zh}`).join('');
}

async function switchTab(id){
  currentTab=id;
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach((el,i)=>{
    el.classList.toggle('active',el.onclick.toString().includes("'"+id+"'"));
  });
  // Render
  if(id==='home') await renderHome();
  else if(id==='tasks') await renderTasks();
  else if(id==='score') renderScoreForm();
  else if(id==='issues') renderIssueForm();
  else if(id==='sop') renderSOP();
  else if(id==='stores') renderStores();
  else if(id==='users') await renderUsers();
}

// ========================================
// DATA
// ========================================
async function loadStores(){
  stores=await sb.select('tks_stores','is_active=eq.true&order=store_name');
  if(!Array.isArray(stores))stores=[];
}

function storeOptions(selected=''){
  return '<option value="">-- 选择店铺 / Select Store --</option>'+
    stores.map(s=>`<option value="${s.id}"${s.id===selected?' selected':''}>${s.store_name}</option>`).join('');
}

function getIssueTags(type){
  const cls={'wrong_item':'wrong','damaged':'damaged','missing_item':'missing','defective':'defective','other':'other'};
  const t=ISSUE_TYPES.find(i=>i.value===type);
  return `<span class="tag tag-${cls[type]||'other'}">${t?t.zh+'/'+t.en:type}</span>`;
}

function getResultTag(r){
  const t=RESULTS.find(i=>i.value===r);
  return `<span class="tag tag-${r}">${t?t.zh+'/'+t.en:r}</span>`;
}

function scoreColor(v){return v>=4?'score-good':v>=3?'score-mid':'score-bad';}

function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function today(){return new Date().toISOString().slice(0,10);}

// ========================================
// HOME
// ========================================
async function renderHome(){
  const el=document.getElementById('tab-home');
  // Load today's checklist
  const checks=await sb.select('tks_checklist',`check_date=eq.${today()}&completed_by=eq.${currentUser.id}&completed=eq.true`);
  const done=Array.isArray(checks)?checks.length:0;
  const total=TASKS.length;
  
  // Load recent issues
  const issues=await sb.select('tks_issues','order=created_at.desc&limit=5');
  
  let html=`
    <div class="card">
      <h3>👋 ${currentUser.display_name}</h3>
      <p class="label-en" style="font-size:.85rem;color:var(--text2)">${new Date().toLocaleDateString('en',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</p>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-val ${done===total?'score-good':'score-mid'}">${done}/${total}</div><div class="stat-label">今日任务 Tasks</div></div>
      <div class="stat-card"><div class="stat-val">${stores.length}</div><div class="stat-label">店铺 Stores</div></div>
      <div class="stat-card"><div class="stat-val">${Array.isArray(issues)?issues.filter(i=>i.result==='pending').length:0}</div><div class="stat-label">待处理 Pending</div></div>
    </div>
    <div class="quick-actions">
      <div class="action-btn" onclick="switchTab('tasks')">
        <div class="action-icon">✅</div>
        <div class="action-zh">今日任务</div>
        <div class="action-en">Today's Checklist</div>
      </div>

async function renderTasks(){
  const el=document.getElementById('tab-tasks');
  const checks=await sb.select('tks_checklist',`check_date=eq.${today()}&completed_by=eq.${currentUser.id}&completed=eq.true`);
  const doneKeys=new Set(Array.isArray(checks)?checks.map(c=>c.task_key):[]);
  
  let html=`<div class="card"><h3>✅ 今日任务清单</h3><p class="label-en">Today's Checklist — ${today()}</p></div>`;
  let lastPeriod='';
  for(const task of TASKS){
    if(task.period!==lastPeriod){
      if(lastPeriod)html+=`</div>`;
      lastPeriod=task.period;
      const pl=PERIOD_LABELS[task.period];
      html+=`<div class="check-period">${pl.zh} <span style="font-weight:400;color:var(--text3)">${pl.en}</span></div><div class="card" style="padding:4px 12px">`;
    }
    const done=doneKeys.has(task.key);
    html+=`<div class="check-item${done?' done':''}" onclick="toggleTask('${task.key}',${!done})">
      <div class="check-box">${done?'✓':''}</div>
      <div class="check-text">
        <div class="zh">${task.icon} ${task.zh}</div>
        <div class="en">${task.en}</div>
        ${done?`<div class="check-time">✓ Completed</div>`:''}
      </div>
    </div>`;
  }
  html+=`</div>`;
  el.innerHTML=html;
}

async function toggleTask(key,complete){
  if(complete){
    await sb.upsert('tks_checklist',{check_date:today(),task_key:key,completed:true,
      completed_by:currentUser.id,completed_at:new Date().toISOString()});
  }else{
    await sb.del('tks_checklist',{check_date:today(),task_key:key,completed_by:currentUser.id});
  }
  renderTasks();
}

function calcScore(){
  const p=parseFloat(document.getElementById('sProduct').value)||0;
  const f=parseFloat(document.getElementById('sFulfill').value)||0;
  const c=parseFloat(document.getElementById('sService').value)||0;
  if(p||f||c){
    const calc=(p*0.45+f*0.40+c*0.15).toFixed(1);
    document.getElementById('scoreCalc').innerHTML=
      `公式 / Formula: ${p}×45% + ${f}×40% + ${c}×15% = <b>${calc}</b>`;
    if(!document.getElementById('sOverall').value)document.getElementById('sOverall').value=calc;
  }
}

  const storeId=document.getElementById('scoreStore').value;
  if(!storeId){toast('请选择店铺 / Please select a store');return;}
  const data={

    overall_score:parseFloat(document.getElementById('sOverall').value)||null,
    product_satisfaction:parseFloat(document.getElementById('sProduct').value)||null,
    fulfillment:parseFloat(document.getElementById('sFulfill').value)||null,
    customer_service:parseFloat(document.getElementById('sService').value)||null,
    negative_review_rate:parseFloat(document.getElementById('sNegReview').value)||null,
    rr_rate:parseFloat(document.getElementById('sRR').value)||null,
    fdr:parseFloat(document.getElementById('sFDR').value)||null,
    sfcr:parseFloat(document.getElementById('sSFCR').value)||null,
    complaint_rate:parseFloat(document.getElementById('sComplaint').value)||null,
    response_rate_12h:parseFloat(document.getElementById('sResp').value)||null,

async function saveIssue(){
  const storeId=document.getElementById('issStore').value;
  if(!storeId){toast('请选择店铺 / Please select a store');return;}
  const data={
    store_id:storeId,
    issue_date:document.getElementById('issDate').value||today(),
    order_id:document.getElementById('issOrder').value.trim(),
    issue_type:document.getElementById('issType').value,
    description:document.getElementById('issDesc').value.trim(),
    action_taken:document.getElementById('issAction').value.trim(),
    result:document.getElementById('issResult').value,
    caused_negative_review:document.getElementById('issNegReview').checked,
    caused_refund:document.getElementById('issRefund').checked,
    recorded_by:currentUser.id
  };
  const res=await sb.insert('tks_issues',data);
  if(Array.isArray(res)&&res.length>0){
    toast('✅ 问题已记录 / Issue logged!');
    ['issOrder','issDesc','issAction'].forEach(id=>document.getElementById(id).value='');

async function loadIssues(){
  const issues=await sb.select('tks_issues','order=created_at.desc&limit=20');

    container.innerHTML='<div class="card"><p style="color:var(--text3);text-align:center;font-size:.85rem">暂无记录 / No issues logged</p></div>';

  let html=`<div class="section-title">问题记录 / Issue Log</div><div class="card">`;

async function addStore(){
  const name=document.getElementById('newStoreName').value.trim();
  if(!name){toast('请输入店铺名称 / Please enter store name');return;}
  const cat=document.getElementById('newStoreCat').value.trim();
  await sb.insert('tks_stores',{store_name:name,category:cat});
  await loadStores();
  renderStores();
  toast('✅ 店铺已添加 / Store added!');
}

function editStore(id,name,cat){
  const newName=prompt('店铺名称 / Store name:',name);
  if(!newName||newName===name){
    const newCat=prompt('类目 / Category:',cat);
    if(newCat!==null&&newCat!==cat){
      sb.update('tks_stores',{id},{category:newCat}).then(()=>{loadStores().then(()=>renderStores());});
    }
    return;
  }
  const newCat=prompt('类目 / Category:',cat);
  sb.update('tks_stores',{id},{store_name:newName,category:newCat||''}).then(()=>{
    loadStores().then(()=>renderStores());
    toast('✅ 已更新 / Updated!');
  });
}

async function deleteStore(id,name){
  if(!confirm(`确定删除 "${name}"？\nDelete "${name}"?\n\n⚠️ 该店铺的所有分数和问题记录也会被删除！\nAll score and issue records will be deleted!`))return;
  await sb.del('tks_stores',{id});
  await loadStores();
  renderStores();
  toast('🗑️ 已删除 / Deleted!');
}

// ========================================
// USER MANAGEMENT (Admin)
// ========================================
async function renderUsers(){
  const el=document.getElementById('tab-users');
  const res=await sb.rpc('tks_list_users',{p_admin_id:currentUser.id});
  const users=res.success?res.users:[];
  
  let html=`
    <div class="card">
      <h3>👥 用户管理</h3>
      <p class="label-en">User Management</p>
    </div>
    <div class="card">
      <div class="section-title">创建新用户 / Create New User</div>
      <div class="form-group"><label>用户名 / Username</label><input type="text" id="newUserName" placeholder="e.g. maria" autocapitalize="off"></div>
      <div class="form-group"><label>显示名 / Display Name</label><input type="text" id="newUserDisplay" placeholder="e.g. Maria Santos"></div>
      <div class="form-group"><label>密码 / Password</label><input type="text" id="newUserPass" placeholder="至少6位 / Min 6 chars"></div>
      <div class="form-group"><label>角色 / Role</label>
        <select id="newUserRole"><option value="staff">Staff 员工</option><option value="admin">Admin 管理员</option></select>
      </div>
      <button class="btn btn-pri" onclick="createUser()">➕ 创建用户 / Create User</button>
    </div>
    <div class="section-title">用户列表 / User List</div>
    <div class="card">`;
  for(const u of users){
    const isSelf=u.id===currentUser.id;
    html+=`<div class="list-item">
      <div>
        <div class="name">${u.display_name} ${isSelf?'(你/You)':''}</div>
        <div class="meta">@${u.username} | <span class="badge ${u.role==='admin'?'':'badge-staff'}">${u.role}</span>
          ${!u.is_active?' | <span style="color:var(--bad)">已禁用 Disabled</span>':''}</div>
      </div>
      <div class="actions">
        ${!isSelf?`<button class="btn btn-ghost btn-sm" onclick="resetUserPw('${u.id}','${u.display_name}')">🔑</button>
        <button class="btn btn-ghost btn-sm" onclick="toggleUser('${u.id}',${u.is_active},'${u.display_name}')">${u.is_active?'🚫':'✅'}</button>`:''}
      </div>
    </div>`;
  }
  html+=`</div>
    <div class="section-title">修改自己的密码 / Change Your Password</div>
    <div class="card">
      <div class="form-group"><label>当前密码 / Current Password</label><input type="password" id="chgOldPw"></div>
      <div class="form-group"><label>新密码 / New Password</label><input type="password" id="chgNewPw"></div>
      <button class="btn btn-ghost" onclick="changeMyPw()">🔑 修改密码 / Change Password</button>
    </div>`;
  el.innerHTML=html;
}

async function createUser(){
  const u=document.getElementById('newUserName').value.trim();
  const d=document.getElementById('newUserDisplay').value.trim();
  const p=document.getElementById('newUserPass').value;
  const r=document.getElementById('newUserRole').value;
  if(!u||!d||!p){toast('请填写所有字段 / Please fill all fields');return;}
  if(p.length<6){toast('密码至少6位 / Password min 6 chars');return;}
  const res=await sb.rpc('tks_create_user',{p_admin_id:currentUser.id,p_username:u,p_password:p,p_display_name:d,p_role:r});
  if(res.success){
    toast('✅ 用户已创建 / User created!');
    ['newUserName','newUserDisplay','newUserPass'].forEach(id=>document.getElementById(id).value='');
    renderUsers();
  }else{toast('❌ '+res.message);}
}

async function resetUserPw(userId,name){
  const newPw=prompt(`为 ${name} 设置新密码 / Set new password for ${name}:`);
  if(!newPw)return;
  if(newPw.length<6){toast('密码至少6位 / Min 6 chars');return;}
  const res=await sb.rpc('tks_update_user',{p_admin_id:currentUser.id,p_user_id:userId,p_password:newPw});
  if(res.success)toast('✅ 密码已重置 / Password reset!');
  else toast('❌ '+res.message);
}

async function toggleUser(userId,isActive,name){
  const action=isActive?'禁用 disable':'启用 enable';
  if(!confirm(`${action} ${name}?`))return;
  const res=await sb.rpc('tks_update_user',{p_admin_id:currentUser.id,p_user_id:userId,p_is_active:!isActive});
  if(res.success){toast('✅ 已更新 / Updated!');renderUsers();}
}

async function changeMyPw(){
  const old=document.getElementById('chgOldPw').value;
  const newPw=document.getElementById('chgNewPw').value;
  if(!old||!newPw){toast('请填写密码 / Please enter passwords');return;}
  if(newPw.length<6){toast('新密码至少6位 / New password min 6 chars');return;}
  const res=await sb.rpc('tks_change_password',{p_user_id:currentUser.id,p_old_password:old,p_new_password:newPw});
  if(res.success){
    toast('✅ 密码已修改 / Password changed!');
    document.getElementById('chgOldPw').value='';
    document.getElementById('chgNewPw').value='';
  }else{toast('❌ '+res.message);}
}
